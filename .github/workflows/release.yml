name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Swift Version
        run: swift --version
      - name: Test
        run: swift test
      - name: Generate Demo Project
        working-directory: Demo
        run: ./generate_project.sh
      - name: Build Demo App
        working-directory: Demo
        run: xcodebuild -project EditorLayoutDemo.xcodeproj -scheme EditorLayoutDemo -configuration Release -destination 'generic/platform=macOS' build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
